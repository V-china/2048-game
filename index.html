<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf8ef;font-family:'Clear Sans','Helvetica Neue',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px;touch-action:none}
h1{font-size:48px;color:#776e65;font-weight:bold;margin-bottom:4px}
.header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:420px;margin-bottom:12px}
.scores{display:flex;gap:8px}
.score-box{background:#bbada0;border-radius:6px;padding:6px 16px;text-align:center;min-width:70px}
.score-box .label{color:#eee4da;font-size:11px;text-transform:uppercase}
.score-box .val{color:#fff;font-size:20px;font-weight:bold}
.msg{font-size:14px;color:#776e65;margin-bottom:8px;min-height:20px}
.board{position:relative;background:#bbada0;border-radius:8px;padding:8px;touch-action:none}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cell{width:90px;height:90px;border-radius:6px;background:#cdc1b4}
.tiles{position:absolute;top:8px;left:8px;width:calc(100% - 16px);height:calc(100% - 16px)}
.tile{position:absolute;width:90px;height:90px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:32px;transition:top .12s,left .12s;animation:pop .15s ease}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.btns{margin-top:12px;display:flex;gap:10px}
.btn{padding:10px 24px;font-size:15px;background:#8f7a66;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.btn:hover{background:#9f8b77}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:36px;font-weight:bold;color:#776e65;flex-direction:column;gap:12px}
.overlay.win{background:rgba(237,194,46,.5);color:#fff}
.overlay .restart{padding:10px 24px;font-size:16px;background:#8f7a66;color:#fff;border:none;border-radius:6px;cursor:pointer}
@media(max-width:420px){.cell,.tile{width:70px;height:70px}.tile{font-size:24px}.board{padding:6px}.grid{gap:6px}}
</style>
</head>
<body>
<div class="header">
<h1>2048</h1>
<div class="scores">
<div class="score-box"><div class="label">Score</div><div class="val" id="score">0</div></div>
<div class="score-box"><div class="label">Best</div><div class="val" id="best">0</div></div>
</div>
</div>
<div class="msg" id="msg">用方向键或滑动操作</div>
<div class="board" id="board">
<div class="grid" id="grid"></div>
<div class="tiles" id="tiles"></div>
</div>
<div class="btns">
<button class="btn" onclick="newGame()">新游戏</button>
</div>

<script>
const SIZE=4;
let grid,score,best=parseInt(localStorage.getItem('best2048'))||0,won=false,over=false;
document.getElementById('best').textContent=best;

const COLORS={
2:{bg:'#eee4da',color:'#776e65'},4:{bg:'#ede0c8',color:'#776e65'},8:{bg:'#f2b179',color:'#fff'},
16:{bg:'#f59563',color:'#fff'},32:{bg:'#f67c5f',color:'#fff'},64:{bg:'#f65e3b',color:'#fff'},
128:{bg:'#edcf72',color:'#fff'},256:{bg:'#edcc61',color:'#fff'},512:{bg:'#edc850',color:'#fff'},
1024:{bg:'#edc53f',color:'#fff'},2048:{bg:'#edc22e',color:'#fff'},4096:{bg:'#3c3a32',color:'#fff'},
8192:{bg:'#3c3a32',color:'#fff'}};

function initGrid(){
const g=document.getElementById('grid');g.innerHTML='';
for(let i=0;i<SIZE*SIZE;i++){const d=document.createElement('div');d.className='cell';g.appendChild(d)}}

function newGame(){
grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
score=0;won=false;over=false;
document.getElementById('score').textContent=0;
document.getElementById('msg').textContent='用方向键或滑动操作';
removeOverlay();addRandom();addRandom();render()}

function addRandom(){
const empty=[];
for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===0)empty.push([r,c]);
if(!empty.length)return;
const[r,c]=empty[Math.floor(Math.random()*empty.length)];
grid[r][c]=Math.random()<.9?2:4}

function render(){
const cont=document.getElementById('tiles');cont.innerHTML='';
const cellSize=document.querySelector('.cell').offsetWidth;
const gap=8;
for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
if(grid[r][c]===0)continue;
const v=grid[r][c];const t=document.createElement('div');t.className='tile';
const cs=COLORS[v]||{bg:'#3c3a32',color:'#fff'};
t.style.background=cs.bg;t.style.color=cs.color;
t.style.top=(r*(cellSize+gap))+'px';t.style.left=(c*(cellSize+gap))+'px';
t.style.width=cellSize+'px';t.style.height=cellSize+'px';
t.style.fontSize=v>=1024?'22px':v>=128?'28px':'32px';
t.textContent=v;cont.appendChild(t)}
document.getElementById('score').textContent=score;
if(score>best){best=score;localStorage.setItem('best2048',best);document.getElementById('best').textContent=best}}

function slide(row){
let arr=row.filter(v=>v!==0);
for(let i=0;i<arr.length-1;i++){
if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];arr[i+1]=0;if(arr[i]===2048&&!won)won=true}}
arr=arr.filter(v=>v!==0);
while(arr.length<SIZE)arr.push(0);
return arr}

function move(dir){
if(over)return;
let moved=false;const prev=JSON.stringify(grid);
if(dir==='left'){for(let r=0;r<SIZE;r++)grid[r]=slide(grid[r])}
else if(dir==='right'){for(let r=0;r<SIZE;r++){grid[r]=slide(grid[r].reverse()).reverse()}}
else if(dir==='up'){for(let c=0;c<SIZE;c++){let col=[];for(let r=0;r<SIZE;r++)col.push(grid[r][c]);col=slide(col);for(let r=0;r<SIZE;r++)grid[r][c]=col[r]}}
else if(dir==='down'){for(let c=0;c<SIZE;c++){let col=[];for(let r=0;r<SIZE;r++)col.push(grid[r][c]);col=slide(col.reverse()).reverse();for(let r=0;r<SIZE;r++)grid[r][c]=col[r]}}
if(JSON.stringify(grid)!==prev){moved=true;addRandom();render();
if(won){showOverlay('🎉 You Win!',true);document.getElementById('msg').textContent='恭喜达到2048！'}
else if(isGameOver()){over=true;showOverlay('Game Over!',false);document.getElementById('msg').textContent='游戏结束'}}}

function isGameOver(){
for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
if(grid[r][c]===0)return false;
if(c<SIZE-1&&grid[r][c]===grid[r][c+1])return false;
if(r<SIZE-1&&grid[r][c]===grid[r+1][c])return false}
return true}

function showOverlay(text,isWin){
removeOverlay();
const o=document.createElement('div');o.className='overlay'+(isWin?' win':'');o.id='ov';
o.innerHTML=`<span>${text}</span><button class="restart" onclick="newGame()">再来一局</button>`;
document.getElementById('board').appendChild(o)}

function removeOverlay(){const o=document.getElementById('ov');if(o)o.remove()}

// Keyboard
document.addEventListener('keydown',e=>{
if(e.key==='ArrowLeft')move('left');else if(e.key==='ArrowRight')move('right');
else if(e.key==='ArrowUp'){e.preventDefault();move('up')}else if(e.key==='ArrowDown'){e.preventDefault();move('down')}});

// Touch/swipe
let tx=0,ty=0;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY});
document.getElementById('board').addEventListener('touchend',e=>{
const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
if(Math.abs(dx)<30&&Math.abs(dy)<30)return;
if(Math.abs(dx)>Math.abs(dy)){move(dx>0?'right':'left')}else{move(dy>0?'down':'up')}});

initGrid();newGame();
</script>
</body>
</html>
